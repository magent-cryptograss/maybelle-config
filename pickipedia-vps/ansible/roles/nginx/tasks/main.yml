---
# Nginx as web server with SSL via certbot
# Replaces Caddy for SSL termination - Caddy has a bug dropping
# Firefox XHR multipart POST bodies through reverse_proxy

- name: Install Nginx
  apt:
    name: nginx
    state: present

- name: Install Certbot
  apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present

- name: Create Nginx HTTP config for MediaWiki (pre-SSL)
  copy:
    dest: /etc/nginx/sites-available/mediawiki
    content: |
      # MediaWiki Nginx configuration with SSL

      server {
          listen 80;
          server_name {{ domain_name }} {{ www_domain }};

          root {{ mediawiki_root }};
          index index.php;

          # Logs
          access_log /var/log/nginx/mediawiki-access.log;
          error_log /var/log/nginx/mediawiki-error.log;

          # Client body size (for content pipeline uploads)
          client_max_body_size 2G;

          # Security headers
          add_header X-Content-Type-Options nosniff;
          add_header X-Frame-Options SAMEORIGIN;
          add_header Referrer-Policy strict-origin-when-cross-origin;

          # www redirect
          if ($host = {{ www_domain }}) {
              return 301 https://{{ domain_name }}$request_uri;
          }

          # MediaWiki short URLs
          location / {
              try_files $uri $uri/ @rewrite;
          }

          location @rewrite {
              rewrite ^/(.*)$ /index.php?title=$1&$args last;
          }

          # PHP handling
          location ~ \.php$ {
              include fastcgi_params;
              fastcgi_pass unix:/run/php/php{{ php_version }}-fpm-mediawiki.sock;
              fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
              fastcgi_param PATH_INFO $fastcgi_path_info;

              # Increase timeouts for long-running scripts
              fastcgi_read_timeout 300;
              fastcgi_send_timeout 300;
          }

          # MediaWiki API
          location /api.php {
              include fastcgi_params;
              fastcgi_pass unix:/run/php/php{{ php_version }}-fpm-mediawiki.sock;
              fastcgi_param SCRIPT_FILENAME $document_root/api.php;

              fastcgi_read_timeout 300;
              fastcgi_send_timeout 300;
          }

          # REST API
          location /rest.php {
              include fastcgi_params;
              fastcgi_pass unix:/run/php/php{{ php_version }}-fpm-mediawiki.sock;
              fastcgi_param SCRIPT_FILENAME $document_root/rest.php;
          }

          # Images
          location /images {
              location ~ \.php$ {
                  deny all;
              }
          }

          # Serve static assets directly
          location /skins {
              expires 30d;
          }

          location /resources {
              expires 30d;
          }

          location /extensions {
              location ~ \.php$ {
                  deny all;
              }
          }

          # Security: deny access to sensitive files
          location ~ ^/(cache|includes|languages|maintenance|tests|vendor)/ {
              deny all;
          }

          location ~ /\. {
              deny all;
          }

          # Favicon and robots
          location = /favicon.ico {
              log_not_found off;
              access_log off;
          }

          location = /robots.txt {
              allow all;
              log_not_found off;
              access_log off;
          }
      }
    mode: '0644'
  notify: Restart Nginx

- name: Enable MediaWiki site
  file:
    src: /etc/nginx/sites-available/mediawiki
    dest: /etc/nginx/sites-enabled/mediawiki
    state: link
  notify: Restart Nginx

- name: Remove default site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Test Nginx configuration
  command: nginx -t
  changed_when: false

- name: Restart Nginx
  systemd:
    name: nginx
    state: restarted
    enabled: yes

- name: Stop Caddy (nginx handles SSL now)
  systemd:
    name: caddy
    state: stopped
    enabled: no
  ignore_errors: yes

- name: Check if SSL cert exists
  stat:
    path: /etc/letsencrypt/live/{{ domain_name }}/fullchain.pem
  register: ssl_cert

- name: Obtain SSL certificate
  command: >
    certbot --nginx -d {{ domain_name }} -d {{ www_domain }}
    --non-interactive --agree-tos --email {{ admin_email }}
    --redirect
  when: not ssl_cert.stat.exists

- name: Ensure certbot auto-renewal timer is enabled
  systemd:
    name: certbot.timer
    state: started
    enabled: yes
