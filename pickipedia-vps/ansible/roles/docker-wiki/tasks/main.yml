---
# Docker-based MediaWiki runtime
# Replaces bare-metal nginx + PHP-FPM with Apache+PHP in Docker
# Fixes: Caddy reverse_proxy drops Firefox XHR POST bodies to nginx (pickipedia#71)

- name: Install Docker prerequisites
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker repository
  apt_repository:
    repo: "deb https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Ensure Docker is running
  systemd:
    name: docker
    state: started
    enabled: yes

# Deploy Docker config and pre-build image BEFORE stopping nginx
# This minimizes downtime — image build can take several minutes
- name: Create Docker config directory
  file:
    path: /opt/pickipedia-docker
    state: directory
    mode: '0755'

- name: Deploy Dockerfile
  template:
    src: Dockerfile.j2
    dest: /opt/pickipedia-docker/Dockerfile
    mode: '0644'
  register: dockerfile_changed

- name: Deploy docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: /opt/pickipedia-docker/docker-compose.yml
    mode: '0644'
  register: compose_changed

# Build image while nginx is still serving traffic
- name: Build wiki Docker image (nginx still running)
  command:
    cmd: docker compose build
    chdir: /opt/pickipedia-docker

# Now the quick switchover — stop nginx, start container
- name: Stop and disable nginx (replaced by Docker Apache)
  systemd:
    name: nginx
    state: stopped
    enabled: no
  ignore_errors: yes

- name: Stop and disable PHP-FPM (replaced by Docker PHP)
  systemd:
    name: "php{{ php_version }}-fpm"
    state: stopped
    enabled: no
  ignore_errors: yes

- name: Start wiki container
  command:
    cmd: docker compose up -d
    chdir: /opt/pickipedia-docker
  register: compose_up

- name: Wait for wiki container to be healthy
  uri:
    url: http://127.0.0.1:8080/
    status_code: [200, 301, 302, 404]
  register: wiki_health
  until: wiki_health.status in [200, 301, 302, 404]
  retries: 15
  delay: 2
