---
# MediaWiki installation and configuration
# Downloads MediaWiki, installs composer dependencies, configures for migration

- name: Create web root directory
  file:
    path: "{{ mediawiki_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Download MediaWiki
  get_url:
    url: "https://releases.wikimedia.org/mediawiki/1.43/mediawiki-{{ mediawiki_version }}.tar.gz"
    dest: /tmp/mediawiki-{{ mediawiki_version }}.tar.gz
    mode: '0644'
  register: mediawiki_download

- name: Extract MediaWiki
  unarchive:
    src: /tmp/mediawiki-{{ mediawiki_version }}.tar.gz
    dest: "{{ mediawiki_root }}"
    remote_src: yes
    extra_opts:
      - --strip-components=1
    owner: www-data
    group: www-data
  when: mediawiki_download.changed

- name: Install Composer
  get_url:
    url: https://getcomposer.org/download/latest-stable/composer.phar
    dest: /usr/local/bin/composer
    mode: '0755'

- name: Create images directory
  file:
    path: "{{ mediawiki_root }}/images"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Create cache directory
  file:
    path: "{{ mediawiki_root }}/cache"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

# NOTE: LocalSettings.php is deployed by Jenkins from the pickipedia repo.
# This ansible role only handles initial VPS provisioning.
# See: https://github.com/cryptograss/pickipedia/blob/main/Jenkinsfile

- name: Fetch GlitchTip DSN from maybelle
  uri:
    url: "https://glitchtip-dsn.maybelle.cryptograss.live/pickipedia-dsn.txt"
    user: deploy
    password: "{{ glitchtip_dsn_fetch_password }}"
    force_basic_auth: true
    return_content: true
  register: glitchtip_dsn_response

- name: Create LocalSettings.local.php with secrets
  copy:
    dest: "{{ mediawiki_root }}/LocalSettings.local.php"
    content: |
      <?php
      # PickiPedia secrets - managed by ansible, NOT checked into version control

      # Database
      $wgDBtype = "mysql";
      $wgDBserver = "localhost";
      $wgDBname = "{{ db_name }}";
      $wgDBuser = "{{ db_user }}";
      $wgDBpassword = "{{ pickipedia_db_password }}";

      # Security keys
      $wgSecretKey = "{{ pickipedia_secret_key }}";
      $wgUpgradeKey = "{{ pickipedia_upgrade_key }}";

      # Sentry/GlitchTip error tracking
      $wgSentryDsn = "{{ glitchtip_dsn_response.content | trim }}";

      # Delivery-kid pinning service API key
      $wgDeliveryKidApiKey = "{{ delivery_kid_api_key }}";
    owner: www-data
    group: www-data
    mode: '0600'

- name: Create job runner script
  copy:
    dest: /usr/local/bin/mediawiki-jobs.sh
    mode: '0755'
    content: |
      #!/bin/bash
      # Run MediaWiki job queue
      cd {{ mediawiki_root }}
      /usr/bin/php maintenance/runJobs.php --maxjobs=50 --maxtime=60 2>&1 | logger -t mediawiki-jobs

- name: Schedule MediaWiki job runner
  ansible.builtin.cron:
    name: "mediawiki job queue"
    minute: "*/5"
    job: "/usr/local/bin/mediawiki-jobs.sh"
    user: www-data

- name: Set permissions on MediaWiki directories
  file:
    path: "{{ item }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'
    recurse: yes
  loop:
    - "{{ mediawiki_root }}/images"
    - "{{ mediawiki_root }}/cache"

- name: Check if MediaUploader is installed
  stat:
    path: "{{ mediawiki_root }}/extensions/MediaUploader/extension.json"
  register: mediauploader_check

- name: Install MediaUploader extension
  command:
    cmd: git clone --branch REL1_43 --depth 1 https://github.com/wikimedia/mediawiki-extensions-MediaUploader.git MediaUploader
    chdir: "{{ mediawiki_root }}/extensions"
    creates: "{{ mediawiki_root }}/extensions/MediaUploader"
  when: not mediauploader_check.stat.exists

- name: Install MediaUploader composer dependencies
  command:
    cmd: composer install --no-dev --no-interaction
    chdir: "{{ mediawiki_root }}/extensions/MediaUploader"
  when: not mediauploader_check.stat.exists

- name: Set MediaUploader ownership
  file:
    path: "{{ mediawiki_root }}/extensions/MediaUploader"
    owner: www-data
    group: www-data
    recurse: yes

- name: Create migration import script
  copy:
    dest: /usr/local/bin/import-pickipedia-backup.sh
    mode: '0750'
    content: |
      #!/bin/bash
      # Import PickiPedia backup from maybelle
      set -euo pipefail

      BACKUP_HOST="{{ backup_host }}"
      BACKUP_PATH="{{ backup_path }}"
      MW_ROOT="{{ mediawiki_root }}"

      echo "=== PickiPedia Migration Import ==="
      echo ""

      # Find latest database backup
      echo "Fetching latest database backup from $BACKUP_HOST..."
      LATEST_DB=$(ssh root@$BACKUP_HOST "ls -t $BACKUP_PATH/pickipedia_*.sql.gz 2>/dev/null | head -1")

      if [ -z "$LATEST_DB" ]; then
          echo "ERROR: No database backup found on $BACKUP_HOST"
          exit 1
      fi

      echo "Found: $LATEST_DB"

      # Download and import database
      echo "Downloading database backup..."
      scp root@$BACKUP_HOST:$LATEST_DB /tmp/pickipedia-import.sql.gz

      echo "Importing database (this may take a while)..."
      gunzip -c /tmp/pickipedia-import.sql.gz | mysql {{ db_name }}

      echo "Database imported successfully."

      # Import images
      echo ""
      echo "Syncing images from $BACKUP_HOST..."
      rsync -avz --progress root@$BACKUP_HOST:$BACKUP_PATH/images/ $MW_ROOT/images/

      echo "Images synced."

      # Fix ownership
      chown -R www-data:www-data $MW_ROOT/images

      # Run MediaWiki update
      echo ""
      echo "Running MediaWiki update script..."
      cd $MW_ROOT
      sudo -u www-data php maintenance/update.php --quick

      echo ""
      echo "=== Import Complete ==="
      echo ""
      echo "Next steps:"
      echo "1. Copy LocalSettings.local.php.template to LocalSettings.local.php"
      echo "2. Fill in database password and secret keys"
      echo "3. Test the wiki: curl -I https://{{ domain_name }}/wiki/Main_Page"

      # Cleanup
      rm -f /tmp/pickipedia-import.sql.gz
