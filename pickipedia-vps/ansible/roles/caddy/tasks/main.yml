---
# Caddy for automatic SSL and reverse proxy
# Much simpler than certbot + nginx SSL config

- name: Install Caddy dependencies
  apt:
    name:
      - debian-keyring
      - debian-archive-keyring
      - apt-transport-https
    state: present

- name: Add Caddy GPG key
  apt_key:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    state: present

- name: Add Caddy repository
  apt_repository:
    repo: "deb https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
    state: present
    filename: caddy-stable

- name: Install Caddy
  apt:
    name: caddy
    state: present
    update_cache: yes

- name: Create Caddy log directory
  file:
    path: /var/log/caddy
    state: directory
    owner: caddy
    group: caddy
    mode: '0755'

- name: Create Caddyfile
  copy:
    dest: /etc/caddy/Caddyfile
    content: |
      # PickiPedia - SSL + PHP-FPM (Caddy direct to FastCGI, no nginx)
      # Eliminates HTTP/1.x proxy body loss on multipart uploads

      {{ domain_name }}, {{ www_domain }} {
          root * {{ mediawiki_root }}

          # Handle www redirect
          @www host {{ www_domain }}
          redir @www https://{{ domain_name }}{uri} permanent

          # Security headers
          header {
              X-Content-Type-Options nosniff
              X-Frame-Options SAMEORIGIN
              Referrer-Policy strict-origin-when-cross-origin
              -Server
          }

          # Compression
          encode gzip zstd

          # Block sensitive directories
          @sensitive path /cache/* /includes/* /languages/* /maintenance/* /tests/* /vendor/*
          respond @sensitive 403

          # Block dotfiles
          @dotfiles path /.*
          respond @dotfiles 403

          # Block PHP execution in images and extensions
          @imgphp path /images/*.php
          respond @imgphp 403
          @extphp path /extensions/*.php
          respond @extphp 403

          # Static assets with caching
          @static path /skins/* /resources/* /extensions/* /images/*
          header @static Cache-Control "public, max-age=2592000"

          # PHP-FPM via FastCGI (direct, no HTTP proxy)
          @phpfiles path *.php
          handle @phpfiles {
              php_fastcgi unix//run/php/php{{ php_version }}-fpm-mediawiki.sock
          }

          # MediaWiki short URLs: /wiki/Page_Name -> /index.php?title=Page_Name
          @notfile {
              not file
              not path /api.php /rest.php /index.php /load.php
          }
          rewrite @notfile /index.php?title={uri}

          # Serve files or fall through to index.php
          try_files {path} /index.php?title={path}
          file_server
      }

      # Health check endpoint (for monitoring from maybelle)
      :8081 {
          respond /health "OK" 200
      }
    mode: '0644'
  notify: Restart Caddy

- name: Start and enable Caddy
  systemd:
    name: caddy
    state: started
    enabled: yes
  register: caddy_start
  ignore_errors: yes

- name: Check Caddy status if start failed
  command: journalctl -u caddy --no-pager -n 20
  register: caddy_journal
  when: caddy_start.failed | default(false)

- name: Show Caddy error
  debug:
    var: caddy_journal.stdout_lines
  when: caddy_start.failed | default(false)

- name: Fail if Caddy didn't start
  fail:
    msg: "Caddy failed to start. Check the journal output above."
  when: caddy_start.failed | default(false)
