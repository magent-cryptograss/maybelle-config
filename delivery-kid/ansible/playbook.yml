---
# Delivery Kid - IPFS Pinning Server
#
# Same pinning service as maybelle, just on a different VPS with Storage Box storage.
#
# Pre-requisites:
# 1. Hetzner CX22 VPS with Ubuntu 24.04
# 2. Hetzner Storage Box BX11 with SMB/CIFS enabled
# 3. DNS records pointing to server

- name: Provision Delivery Kid Server
  hosts: delivery-kid
  become: yes

  vars_files:
    - ../../secrets/vault.yml

  vars:
    domain_name: "delivery-kid.cryptograss.live"
    ipfs_gateway_domain: "ipfs.delivery-kid.cryptograss.live"
    ipfs_admin_domain: "ipfs-admin.delivery-kid.cryptograss.live"
    # Pinning service authorized wallets - same as maybelle
    authorized_wallets_config: "{{ lookup('file', playbook_dir + '/../../maybelle/pinning-service/authorized-wallets.json') | from_json }}"
    pinning_authorized_wallets: "{{ authorized_wallets_config.wallets | map(attribute='address') | join(',') }}"

  tasks:
    - name: Deploy SSH login banner
      copy:
        src: "{{ playbook_dir }}/../../ascii-art/delivery-kid.txt"
        dest: /etc/motd
        mode: '0644'

    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - docker.io
          - docker-compose-v2
          - cifs-utils
          - jq
        state: present
        update_cache: yes

    # Mount Hetzner Storage Box for IPFS block storage
    - name: Create Storage Box credentials file
      copy:
        content: |
          username={{ storage_box_user }}
          password={{ storage_box_password }}
        dest: /root/.storage-box-credentials
        mode: '0600'

    - name: Create Storage Box mount point
      file:
        path: /mnt/storage-box
        state: directory
        mode: '0755'

    - name: Mount Storage Box via CIFS
      mount:
        path: /mnt/storage-box
        src: "//{{ storage_box_host }}/backup"
        fstype: cifs
        # uid/gid 1000 matches the 'ipfs' user inside the kubo container
        opts: "credentials=/root/.storage-box-credentials,uid=1000,gid=1000,file_mode=0755,dir_mode=0755"
        state: mounted

    # Create directories for IPFS and pinning service
    - name: Create IPFS directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /mnt/storage-box/ipfs
        - /mnt/storage-box/ipfs/blocks
        - /mnt/storage-box/staging  # Temp files for uploads/transcoding
        - /var/lib/ipfs             # Local metadata only

    - name: Create pinning service directory
      file:
        path: /opt/pinning-service
        state: directory
        mode: '0755'

    # Copy pinning service (delivery-kid's own Python FastAPI service)
    - name: Copy pinning service files
      copy:
        src: "{{ playbook_dir }}/../pinning-service/"
        dest: /opt/pinning-service/
        mode: '0644'

    - name: Create Docker network for services
      docker_network:
        name: delivery-kid-net
        state: present

    # Docker Compose for IPFS + Pinning Service
    - name: Get git commit hash
      local_action:
        module: command
        cmd: git rev-parse --short HEAD
        chdir: "{{ playbook_dir }}/../../"
      register: git_commit
      changed_when: false

    - name: Create docker-compose file
      copy:
        dest: /opt/pinning-service/docker-compose.yml
        mode: '0644'
        content: |
          services:
            pinning:
              build:
                context: .
                args:
                  GIT_COMMIT: "{{ git_commit.stdout }}"
                  BUILD_TIME: "{{ ansible_date_time.iso8601 }}"
              container_name: pinning-service
              environment:
                - NODE_NAME=delivery-kid
                - PORT=3001
                - PINATA_JWT={{ pinata_jwt }}
                - AUTHORIZED_WALLETS={{ pinning_authorized_wallets }}
                - IPFS_API_URL=http://ipfs:5001
                - IPFS_GATEWAY_URL=https://{{ ipfs_gateway_domain }}
                - STAGING_DIR=/staging
              volumes:
                - /mnt/storage-box/staging:/staging
              ports:
                - "127.0.0.1:3001:3001"
              networks:
                - delivery-kid-net
              restart: unless-stopped
              depends_on:
                - ipfs

            ipfs:
              image: ipfs/kubo:latest
              container_name: ipfs
              volumes:
                - /var/lib/ipfs:/data/ipfs
                - /mnt/storage-box/ipfs/blocks:/data/ipfs/blocks
                - /mnt/storage-box/staging:/export
              ports:
                - "127.0.0.1:5001:5001"  # API
                - "127.0.0.1:8080:8080"  # Gateway
                - "4001:4001"             # Swarm TCP
                - "4001:4001/udp"         # Swarm UDP
              networks:
                - delivery-kid-net
              environment:
                - IPFS_PROFILE=server
              restart: unless-stopped

          networks:
            delivery-kid-net:
              external: true
              name: delivery-kid-net

    - name: Start services
      community.docker.docker_compose_v2:
        project_src: /opt/pinning-service
        build: always
        state: present

    # Wait for IPFS container to be running (not API - that won't work until configured)
    - name: Wait for IPFS container to start
      command: docker inspect -f '{% raw %}{{.State.Running}}{% endraw %}' ipfs
      register: ipfs_container_state
      until: ipfs_container_state.stdout == 'true'
      retries: 30
      delay: 2

    # Configure IPFS to listen on all interfaces BEFORE health check
    # By default kubo listens on 127.0.0.1 which doesn't work with Docker port forwarding
    - name: Check IPFS API listen address
      command: docker exec ipfs ipfs config Addresses.API
      register: ipfs_api_addr
      changed_when: false

    - name: Check IPFS Gateway listen address
      command: docker exec ipfs ipfs config Addresses.Gateway
      register: ipfs_gateway_addr
      changed_when: false

    - name: Configure IPFS to listen on all interfaces
      block:
        - name: Stop IPFS for config change
          command: docker stop ipfs

        - name: Remove stale repo lock
          file:
            path: /var/lib/ipfs/repo.lock
            state: absent

        - name: Set IPFS API listen address
          command: >
            docker run --rm
            -v /var/lib/ipfs:/data/ipfs
            -v /mnt/storage-box/ipfs/blocks:/data/ipfs/blocks
            ipfs/kubo:latest
            config Addresses.API /ip4/0.0.0.0/tcp/5001
          when: "'/ip4/0.0.0.0/' not in ipfs_api_addr.stdout"

        - name: Set IPFS Gateway listen address
          command: >
            docker run --rm
            -v /var/lib/ipfs:/data/ipfs
            -v /mnt/storage-box/ipfs/blocks:/data/ipfs/blocks
            ipfs/kubo:latest
            config Addresses.Gateway /ip4/0.0.0.0/tcp/8080
          when: "'/ip4/0.0.0.0/' not in ipfs_gateway_addr.stdout"

        - name: Start IPFS after config change
          command: docker start ipfs
      when: "'/ip4/0.0.0.0/' not in ipfs_api_addr.stdout or '/ip4/0.0.0.0/' not in ipfs_gateway_addr.stdout"

    # NOW health check - API should be reachable
    - name: Wait for IPFS API to be ready
      uri:
        url: http://127.0.0.1:5001/api/v0/id
        method: POST
        status_code: [200]
      register: ipfs_health
      until: ipfs_health.status == 200
      retries: 30
      delay: 2

    - name: Wait for pinning service to be ready
      uri:
        url: http://127.0.0.1:3001/health
        status_code: [200]
      register: pinning_health
      until: pinning_health.status == 200
      retries: 30
      delay: 2

    # Configure CORS for IPFS WebUI access
    - name: Check if IPFS API CORS is configured
      command: docker exec ipfs ipfs config API.HTTPHeaders.Access-Control-Allow-Origin
      register: ipfs_cors_check
      changed_when: false
      failed_when: false

    - name: Configure IPFS API CORS
      block:
        - name: Stop IPFS for CORS config
          command: docker stop ipfs

        - name: Remove stale repo lock
          file:
            path: /var/lib/ipfs/repo.lock
            state: absent

        - name: Configure IPFS API CORS origins
          command: >
            docker run --rm
            -v /var/lib/ipfs:/data/ipfs
            -v /mnt/storage-box/ipfs/blocks:/data/ipfs/blocks
            ipfs/kubo:latest
            config --json API.HTTPHeaders.Access-Control-Allow-Origin '["https://{{ ipfs_admin_domain }}", "http://localhost:5001", "http://127.0.0.1:5001"]'

        - name: Configure IPFS API CORS methods
          command: >
            docker run --rm
            -v /var/lib/ipfs:/data/ipfs
            -v /mnt/storage-box/ipfs/blocks:/data/ipfs/blocks
            ipfs/kubo:latest
            config --json API.HTTPHeaders.Access-Control-Allow-Methods '["PUT", "POST", "GET"]'

        - name: Start IPFS after CORS config
          command: docker start ipfs

        - name: Wait for IPFS to be ready after CORS config
          uri:
            url: http://127.0.0.1:5001/api/v0/id
            method: POST
            status_code: [200]
          register: ipfs_cors_health
          until: ipfs_cors_health.status == 200
          retries: 30
          delay: 2
      when: "ipfs_admin_domain not in (ipfs_cors_check.stdout | default(''))"

    # Caddy reverse proxy - install from official repo (not Ubuntu's)
    - name: Add Caddy GPG key
      apt_key:
        url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
        state: present

    - name: Add Caddy repository
      apt_repository:
        repo: "deb https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
        state: present
        filename: caddy-stable

    - name: Install Caddy
      apt:
        name: caddy
        state: present
        update_cache: yes

    # Generate password hash for IPFS admin (using same password as maybelle)
    - name: Generate IPFS admin password hash
      command: docker run --rm caddy caddy hash-password --plaintext '{{ maybelle_ipfs_admin_password }}'
      register: ipfs_password_hash_result
      changed_when: false
      no_log: true

    - name: Set IPFS admin password hash fact
      set_fact:
        ipfs_admin_password_hash: "{{ ipfs_password_hash_result.stdout }}"

    - name: Configure Caddy
      copy:
        dest: /etc/caddy/Caddyfile
        content: |
          {{ domain_name }} {
              route {
                  reverse_proxy /health localhost:3001
                  reverse_proxy /version localhost:3001
                  reverse_proxy /time localhost:3001
                  reverse_proxy /local-pins localhost:3001
                  reverse_proxy /pin* localhost:3001
                  reverse_proxy /transcode* localhost:3001
                  reverse_proxy /job* localhost:3001
                  reverse_proxy /webhook/* localhost:3001
                  reverse_proxy /sync/* localhost:3001
                  reverse_proxy /releases localhost:3001
                  respond "delivery-kid pinning service" 200
              }
          }

          {{ ipfs_gateway_domain }} {
              reverse_proxy localhost:8080
          }

          # IPFS admin/WebUI (authenticated)
          {{ ipfs_admin_domain }} {
              basicauth {
                  admin {{ ipfs_admin_password_hash }}
              }
              reverse_proxy localhost:5001
          }
        mode: '0644'
      notify: Restart Caddy

    - name: Start and enable Caddy
      systemd:
        name: caddy
        state: started
        enabled: yes

  handlers:
    - name: Restart Caddy
      systemd:
        name: caddy
        state: restarted
