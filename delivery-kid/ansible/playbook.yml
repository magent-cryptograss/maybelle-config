---
# Delivery Kid - IPFS Pinning Server
#
# Same pinning service as maybelle, just on a different VPS with Storage Box storage.
#
# Pre-requisites:
# 1. Hetzner CX22 VPS with Ubuntu 24.04
# 2. Hetzner Storage Box BX11 with SMB/CIFS enabled
# 3. DNS records pointing to server

- name: Provision Delivery Kid Server
  hosts: delivery-kid
  become: yes

  vars_files:
    - ../../secrets/vault.yml

  vars:
    domain_name: "delivery-kid.cryptograss.live"
    ipfs_gateway_domain: "ipfs.delivery-kid.cryptograss.live"
    # Pinning service authorized wallets - same as maybelle
    authorized_wallets_config: "{{ lookup('file', playbook_dir + '/../../maybelle/pinning-service/authorized-wallets.json') | from_json }}"
    pinning_authorized_wallets: "{{ authorized_wallets_config.wallets | map(attribute='address') | join(',') }}"

  tasks:
    - name: Deploy SSH login banner
      copy:
        src: "{{ playbook_dir }}/../../ascii-art/delivery-kid.txt"
        dest: /etc/motd
        mode: '0644'

    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - docker.io
          - docker-compose-v2
          - cifs-utils
          - jq
        state: present
        update_cache: yes

    # Mount Hetzner Storage Box for IPFS block storage
    - name: Create Storage Box credentials file
      copy:
        content: |
          username={{ storage_box_user }}
          password={{ storage_box_password }}
        dest: /root/.storage-box-credentials
        mode: '0600'

    - name: Create Storage Box mount point
      file:
        path: /mnt/storage-box
        state: directory
        mode: '0755'

    - name: Mount Storage Box via CIFS
      mount:
        path: /mnt/storage-box
        src: "//{{ storage_box_host }}/backup"
        fstype: cifs
        # uid/gid 1000 matches the 'ipfs' user inside the kubo container
        opts: "credentials=/root/.storage-box-credentials,uid=1000,gid=1000,file_mode=0755,dir_mode=0755"
        state: mounted

    # Create directories for IPFS and pinning service
    - name: Create IPFS directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /mnt/storage-box/ipfs
        - /mnt/storage-box/ipfs/blocks
        - /var/lib/ipfs          # Local metadata
        - /var/lib/ipfs/staging

    - name: Create pinning service directory
      file:
        path: /opt/pinning-service
        state: directory
        mode: '0755'

    # Copy pinning service from maybelle (same code, different VPS)
    - name: Copy pinning service files
      copy:
        src: "{{ playbook_dir }}/../../maybelle/pinning-service/"
        dest: /opt/pinning-service/
        mode: '0644'

    - name: Create Docker network for services
      docker_network:
        name: delivery-kid-net
        state: present

    # Docker Compose for IPFS + Pinning Service
    # Same as maybelle, just different URLs
    - name: Create docker-compose file
      copy:
        dest: /opt/pinning-service/docker-compose.yml
        mode: '0644'
        content: |
          services:
            pinning:
              build:
                context: .
              container_name: pinning-service
              environment:
                - PORT=3001
                - PINATA_JWT={{ pinata_jwt }}
                - AUTHORIZED_WALLETS={{ pinning_authorized_wallets }}
                - IPFS_API_URL=http://ipfs:5001
                - IPFS_GATEWAY_URL=https://{{ ipfs_gateway_domain }}
                - STAGING_DIR=/staging
                - WIKI_URL=https://pickipedia.xyz
                - WIKI_BOT_USER={{ BLUERAILROAD_BOT_USERNAME }}
                - WIKI_BOT_PASSWORD={{ BLUERAILROAD_BOT_PASSWORD }}
                - COCONUT_API_KEY={{ coconut_api_key | default('') }}
                - WEBHOOK_BASE_URL=https://{{ domain_name }}
              volumes:
                - /var/lib/ipfs/staging:/staging
              ports:
                - "127.0.0.1:3001:3001"
              networks:
                - delivery-kid-net
              restart: unless-stopped
              depends_on:
                - ipfs

            ipfs:
              image: ipfs/kubo:latest
              container_name: ipfs
              volumes:
                - /var/lib/ipfs:/data/ipfs
                - /mnt/storage-box/ipfs/blocks:/data/ipfs/blocks
                - /var/lib/ipfs/staging:/export
              ports:
                - "127.0.0.1:5001:5001"  # API
                - "127.0.0.1:8080:8080"  # Gateway
                - "4001:4001"             # Swarm TCP
                - "4001:4001/udp"         # Swarm UDP
              networks:
                - delivery-kid-net
              environment:
                - IPFS_PROFILE=server
              restart: unless-stopped

          networks:
            delivery-kid-net:
              external: true
              name: delivery-kid-net

    - name: Start services
      community.docker.docker_compose_v2:
        project_src: /opt/pinning-service
        build: always
        recreate: always
        state: present

    - name: Wait for pinning service to be ready
      uri:
        url: http://127.0.0.1:3001/health
        status_code: [200]
      register: pinning_health
      until: pinning_health.status == 200
      retries: 30
      delay: 2

    # Caddy reverse proxy
    - name: Install Caddy
      apt:
        name: caddy
        state: present

    - name: Configure Caddy
      copy:
        dest: /etc/caddy/Caddyfile
        content: |
          {{ domain_name }} {
              @pinning {
                  path /health /time /local-pins
                  path /pin* /transcode* /job* /webhook/*
              }
              reverse_proxy @pinning localhost:3001

              respond "delivery-kid pinning service" 200
          }

          {{ ipfs_gateway_domain }} {
              reverse_proxy localhost:8080
          }
        mode: '0644'
      notify: Reload Caddy

  handlers:
    - name: Reload Caddy
      systemd:
        name: caddy
        state: reloaded
