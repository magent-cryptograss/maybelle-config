---
- name: Create pinning service directory
  file:
    path: /opt/pinning-service
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create staging directory
  file:
    path: /var/lib/pinning-service/staging
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create jobs directory
  file:
    path: /var/lib/pinning-service/staging/jobs
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Install ffmpeg for video transcoding
  apt:
    name:
      - ffmpeg
    state: present

- name: Install yt-dlp for URL downloads
  pip:
    name: yt-dlp
    state: present

- name: Copy pinning service files
  synchronize:
    src: ../../../pinning-service/
    dest: /opt/pinning-service/
    rsync_opts:
      - "--exclude=node_modules"
  notify: restart pinning-service

- name: Install pinning service dependencies
  npm:
    path: /opt/pinning-service
    state: present

- name: Create pinning service systemd unit
  template:
    src: pinning-service.service.j2
    dest: /etc/systemd/system/pinning-service.service
    mode: '0644'
  notify: restart pinning-service

- name: Enable and start pinning service
  systemd:
    name: pinning-service
    enabled: yes
    state: started
    daemon_reload: yes

# PickiPedia sync for releases
- name: Create sync-releases service
  template:
    src: sync-releases.service.j2
    dest: /etc/systemd/system/sync-releases.service
    mode: '0644'

- name: Create sync-releases timer
  template:
    src: sync-releases.timer.j2
    dest: /etc/systemd/system/sync-releases.timer
    mode: '0644'

- name: Enable sync-releases timer
  systemd:
    name: sync-releases.timer
    enabled: yes
    state: started
    daemon_reload: yes

- name: Run initial sync (may take a while if there's content to pin)
  systemd:
    name: sync-releases.service
    state: started
  ignore_errors: yes
